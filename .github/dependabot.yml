version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # @types/node tracks Node major versions. Our runtime is Node 22 LTS
      # (per .node-version + verify-pipeline). @types/node 23+ surfaces APIs
      # that aren't available on our LTS, polluting IDE autocomplete and
      # making it easy to accidentally use a non-LTS API. Re-evaluate when
      # we migrate to Node 24+ LTS (~2026Q4).
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # @types/chrome 0.1.x dropped/renamed types our extension code uses
      # (TabChangeInfo, DOMRect literal types). Stay on 0.0.x until either
      # @types/chrome stabilizes (1.0+) or extension is refactored anyway.
      - dependency-name: "@types/chrome"
        versions: [">=0.1.0"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
