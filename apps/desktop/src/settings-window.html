<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Auto Job — Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
      max-width: 480px;
      margin: 0 auto;
      background: #f5f5f7;
      color: #1d1d1f;
    }
    h1 { font-size: 18px; margin: 0 0 16px; }
    label { display: block; margin-top: 16px; font-size: 13px; font-weight: 500; }
    select, input[type="password"], input[type="text"] {
      display: block; width: 100%; padding: 8px;
      border: 1px solid #c7c7cc; border-radius: 6px;
      font-size: 13px; margin-top: 6px;
      background: white;
      box-sizing: border-box;
    }
    .checkbox-row { display: flex; align-items: center; gap: 8px; margin-top: 16px; font-size: 13px; }
    .buttons { margin-top: 24px; display: flex; justify-content: flex-end; gap: 8px; }
    button {
      padding: 8px 16px; border-radius: 6px; border: none;
      font-size: 13px; font-weight: 500; cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: default; }
    .primary { background: #007aff; color: white; }
    .secondary { background: #e5e5ea; color: #1d1d1f; }
    .key-status { font-size: 12px; color: #6e6e73; margin-top: 4px; }
    .hidden { display: none; }
    .error { color: #c0392b; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Settings</h1>

  <label for="backend">Evaluation backend</label>
  <select id="backend">
    <option value="real-codex">Codex CLI (default)</option>
    <option value="real-claude">Claude CLI</option>
    <option value="real-openrouter">OpenRouter API</option>
    <option value="fake">Fake (testing)</option>
  </select>

  <div id="openrouter-section" class="hidden">
    <label for="openrouter-key">OpenRouter API Key</label>
    <input id="openrouter-key" type="password" placeholder="sk-or-...">
    <div class="key-status" id="key-status">Not set</div>

    <label for="openrouter-model-select">OpenRouter Model</label>
    <select id="openrouter-model-select">
      <optgroup label="Anthropic — Claude">
        <option value="anthropic/claude-opus-4.7">Opus 4.7 — best quality · $5/M</option>
        <option value="anthropic/claude-opus-4.6">Opus 4.6 — strong · $5/M</option>
        <option value="anthropic/claude-sonnet-4.6">Sonnet 4.6 — balanced (default) · $3/M</option>
        <option value="anthropic/claude-sonnet-latest">Sonnet (latest, auto-tracking) · $3/M</option>
        <option value="anthropic/claude-haiku-latest">Haiku (latest) — fast &amp; cheap · $1/M</option>
        <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet — legacy</option>
      </optgroup>
      <optgroup label="OpenAI — GPT">
        <option value="openai/gpt-5.5-pro">GPT-5.5 Pro — best · $30/M</option>
        <option value="openai/gpt-5.5">GPT-5.5 — strong · $5/M</option>
        <option value="openai/gpt-5.4-pro">GPT-5.4 Pro · $30/M</option>
        <option value="openai/gpt-5.4">GPT-5.4 — balanced · $2.50/M</option>
        <option value="openai/gpt-5.4-mini">GPT-5.4 Mini — cheap · $0.75/M</option>
        <option value="openai/gpt-5.4-nano">GPT-5.4 Nano — cheapest · $0.20/M</option>
        <option value="openai/gpt-5.3-codex">GPT-5.3 Codex — coding · $1.75/M</option>
      </optgroup>
      <optgroup label="Google — Gemini">
        <option value="google/gemini-3.1-pro-preview">Gemini 3.1 Pro Preview · $2/M</option>
        <option value="google/gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite — cheap · $0.25/M</option>
        <option value="google/gemini-pro-latest">Gemini Pro (latest) · $2/M</option>
        <option value="google/gemini-flash-latest">Gemini Flash (latest) · $0.50/M</option>
      </optgroup>
      <optgroup label="DeepSeek">
        <option value="deepseek/deepseek-v4-pro">DeepSeek V4 Pro — reasoning · $0.44/M</option>
        <option value="deepseek/deepseek-v4-flash">DeepSeek V4 Flash — cheap · $0.14/M</option>
      </optgroup>
      <optgroup label="Qwen (Alibaba)">
        <option value="qwen/qwen3-coder-next">Qwen3 Coder Next — coding · $0.14/M</option>
        <option value="qwen/qwen3.6-max-preview">Qwen3.6 Max — strong · $1.04/M</option>
        <option value="qwen/qwen3.6-flash">Qwen3.6 Flash — fast · $0.25/M</option>
      </optgroup>
      <optgroup label="xAI — Grok">
        <option value="x-ai/grok-4.20">Grok 4.20 · $2/M</option>
      </optgroup>
      <optgroup label="Free tier (zero cost)">
        <option value="inclusionai/ling-2.6-1t:free">Ling 2.6 1T — strong reasoning · 256k ctx</option>
        <option value="nvidia/nemotron-3-super-120b-a12b:free">Nemotron 3 Super 120B — strong · 256k ctx</option>
        <option value="tencent/hy3-preview:free">Tencent Hy3 Preview · 256k ctx</option>
        <option value="google/gemma-4-31b-it:free">Gemma 4 31B · 256k ctx</option>
        <option value="google/gemma-4-26b-a4b-it:free">Gemma 4 26B A4B · 256k ctx</option>
        <option value="nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free">Nemotron 3 Nano 30B — reasoning · 256k ctx</option>
        <option value="minimax/minimax-m2.5:free">MiniMax M2.5 · 192k ctx</option>
        <option value="poolside/laguna-m.1:free">Poolside Laguna M.1 · 128k ctx</option>
        <option value="poolside/laguna-xs.2:free">Poolside Laguna XS.2 — small · 128k ctx</option>
        <option value="baidu/qianfan-ocr-fast:free">Baidu Qianfan-OCR — OCR/vision · 64k ctx</option>
      </optgroup>
      <optgroup label="Other">
        <option value="__custom__">Custom slug…</option>
      </optgroup>
    </select>
    <input id="openrouter-model-custom" type="text" placeholder="provider/model-name"
           autocomplete="off" class="hidden" style="margin-top:8px">
    <div class="key-status">Prices are per 1M prompt tokens. Pick "Custom slug…" to type any model from openrouter.ai/models.</div>
  </div>

  <div class="checkbox-row">
    <input id="start-at-login" type="checkbox">
    <label for="start-at-login" style="margin: 0;">Start Auto Job at login</label>
  </div>

  <div class="error hidden" id="error"></div>

  <div class="buttons">
    <button class="secondary" id="cancel">Cancel</button>
    <button class="primary" id="save">Save &amp; Restart</button>
  </div>

  <script>
    (function () {
      const api = window.careerOpsSettings;
      if (!api) {
        document.body.innerHTML =
          "<p>Preload script not loaded — settings UI cannot communicate with the app. " +
          "Run <code>npm --prefix apps/desktop run build:preload</code> and relaunch.</p>";
        return;
      }

      const backendSel = document.getElementById("backend");
      const openrouterSection = document.getElementById("openrouter-section");
      const keyStatus = document.getElementById("key-status");
      const keyInput = document.getElementById("openrouter-key");
      const modelSelect = document.getElementById("openrouter-model-select");
      const modelCustom = document.getElementById("openrouter-model-custom");
      const startAtLogin = document.getElementById("start-at-login");

      function knownModelSlugs() {
        return Array.from(modelSelect.querySelectorAll('option'))
          .map(o => o.value)
          .filter(v => v && v !== "__custom__");
      }

      function applyModelToUI(slug) {
        const known = new Set(knownModelSlugs());
        if (slug && known.has(slug)) {
          modelSelect.value = slug;
          modelCustom.classList.add("hidden");
          modelCustom.value = "";
        } else {
          // Saved value is custom (or empty) — show the input prefilled.
          modelSelect.value = "__custom__";
          modelCustom.classList.remove("hidden");
          modelCustom.value = slug || "";
        }
      }

      function selectedModelSlug() {
        if (modelSelect.value === "__custom__") {
          return modelCustom.value.trim();
        }
        return modelSelect.value;
      }

      modelSelect.addEventListener("change", () => {
        if (modelSelect.value === "__custom__") {
          modelCustom.classList.remove("hidden");
          modelCustom.focus();
        } else {
          modelCustom.classList.add("hidden");
        }
      });
      const saveBtn = document.getElementById("save");
      const cancelBtn = document.getElementById("cancel");
      const errEl = document.getElementById("error");

      function showError(msg) {
        errEl.textContent = msg;
        errEl.classList.remove("hidden");
      }
      function clearError() {
        errEl.textContent = "";
        errEl.classList.add("hidden");
      }

      function toggleOpenRouterSection() {
        openrouterSection.classList.toggle("hidden", backendSel.value !== "real-openrouter");
      }

      api.load().then((state) => {
        backendSel.value = state.backend;
        startAtLogin.checked = !!state.startAtLogin;
        keyStatus.textContent = state.hasKey
          ? "Key is set (paste a new key to overwrite)"
          : "Not set";
        applyModelToUI(state.openrouterModel || "");
        toggleOpenRouterSection();
      });

      backendSel.addEventListener("change", toggleOpenRouterSection);
      cancelBtn.addEventListener("click", () => api.close());

      saveBtn.addEventListener("click", async () => {
        clearError();
        saveBtn.disabled = true;
        const originalLabel = saveBtn.textContent;
        saveBtn.textContent = "Saving…";
        try {
          await api.save({
            backend: backendSel.value,
            startAtLogin: startAtLogin.checked,
            openrouterKey: keyInput.value.trim() || null,
            openrouterModel: selectedModelSlug() || null,
          });
          api.close();
        } catch (err) {
          showError("Save failed: " + (err && err.message ? err.message : String(err)));
          saveBtn.disabled = false;
          saveBtn.textContent = originalLabel;
        }
      });
    })();
  </script>
</body>
</html>
