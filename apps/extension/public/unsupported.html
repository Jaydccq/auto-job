<!doctype html>

    <title>auto-job — open a job page</title>
    <link rel="stylesheet" href="unsupported.css" />
  </head>
  <body>
    <main>
      <h1>Open a job page first</h1>
      <p>
        auto-job opens inside regular web pages. Chrome blocks extensions from
        injecting panels into browser pages like <code>chrome://extensions</code>.
      </p>
      <p>
        Open a job posting tab, then click the auto-job toolbar icon or press
        <code>Alt+Shift+C</code>.
      </p>
    </main>
  </body>
